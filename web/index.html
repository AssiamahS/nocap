<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nocap - Rep Counter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .header h1 span { color: #ff3b30; }
    .badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: #1a1a1a; color: #888; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
    }

    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
    }

    .player-wrap {
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1a1a1a;
    }

    .video-container {
      position: relative;
      background: #000;
      aspect-ratio: 3/4;
      max-height: 65vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .rep-flash {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 48px;
      font-weight: 800;
      color: #ff3b30;
      opacity: 0;
      text-shadow: 0 2px 20px rgba(255, 59, 48, 0.5);
      pointer-events: none;
    }

    .rep-flash.show { animation: repPop 0.6s ease-out forwards; }

    @keyframes repPop {
      0% { opacity: 1; transform: scale(1.4); }
      100% { opacity: 0; transform: scale(1); }
    }

    .rep-counter-overlay {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      padding: 8px 14px;
      border-radius: 8px;
      pointer-events: none;
    }

    .rep-counter-overlay .count { font-size: 28px; color: #fff; line-height: 1; font-weight: 700; }
    .rep-counter-overlay .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

    /* Skeleton toggle */
    .skeleton-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      border: 1px solid #333;
      color: #888;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      z-index: 5;
      transition: all 0.15s;
    }

    .skeleton-toggle.active { color: #ff3b30; border-color: #ff3b30; }

    /* Timeline */
    .timeline-section { padding: 12px 16px; border-top: 1px solid #1a1a1a; }

    .timeline-bar {
      position: relative;
      height: 36px;
      background: #1a1a1a;
      border-radius: 6px;
      cursor: pointer;
      overflow: visible;
    }

    .timeline-progress {
      height: 100%;
      background: linear-gradient(90deg, #ff3b30, #ff6b5e);
      border-radius: 6px;
      transition: width 0.05s linear;
      pointer-events: none;
    }

    .timeline-rep-marker {
      position: absolute;
      top: -4px;
      width: 3px;
      height: 44px;
      background: #ffcc00;
      border-radius: 2px;
      pointer-events: none;
      z-index: 2;
    }

    .timeline-rep-marker::after {
      content: attr(data-rep);
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 700;
      color: #ffcc00;
    }

    .timeline-time {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      font-size: 11px;
      color: #666;
      font-variant-numeric: tabular-nums;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid #1a1a1a;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary { background: #ff3b30; color: #fff; }
    .btn-primary:hover { background: #e0342a; }
    .btn-ghost { background: #1a1a1a; color: #ccc; }
    .btn-ghost:hover { background: #222; }
    .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 50%; }
    .speed-select { background: #1a1a1a; color: #ccc; border: none; padding: 6px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .controls .spacer { flex: 1; }

    /* Sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 12px; }

    .session-list {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
    }

    .session-list-header {
      padding: 12px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #1a1a1a;
    }

    .session-item {
      padding: 12px 14px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid #0f0f0f;
    }

    .session-item:hover { background: #1a1a1a; }
    .session-item.active { background: #1a1a1a; border-left: 3px solid #ff3b30; }
    .session-item .title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }

    .session-item .meta { font-size: 12px; color: #666; display: flex; gap: 10px; }

    .reps-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 59, 48, 0.15);
      color: #ff6b5e;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 13px;
    }

    .card {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 12px;
      padding: 14px;
    }

    .card h3 {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .stat-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 13px; }
    .stat-row .label { color: #666; }
    .stat-row .value { color: #e0e0e0; font-weight: 600; font-variant-numeric: tabular-nums; }

    .rep-timeline-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      font-size: 13px;
      cursor: pointer;
      transition: color 0.15s;
    }

    .rep-timeline-item:hover { color: #ff3b30; }

    .rep-timeline-item .rep-num {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      background: #1a1a1a; border-radius: 50%;
      font-size: 11px; font-weight: 700;
    }

    .rep-timeline-item .rep-time { color: #888; font-variant-numeric: tabular-nums; }

    .rep-quality { margin-left: auto; font-size: 11px; padding: 2px 6px; border-radius: 3px; }
    .rep-quality.clean { background: rgba(52, 199, 89, 0.15); color: #34c759; }
    .rep-quality.grinder { background: rgba(255, 204, 0, 0.15); color: #ffcc00; }
    .rep-quality.half { background: rgba(255, 149, 0, 0.15); color: #ff9500; }

    .comment-input-wrap { display: flex; gap: 6px; }

    .comment-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #222;
      color: #e0e0e0;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }

    .comment-input:focus { border-color: #ff3b30; }

    .comment-list { margin-top: 10px; max-height: 180px; overflow-y: auto; }

    .comment-item {
      display: flex; gap: 8px; padding: 6px 0;
      border-bottom: 1px solid #1a1a1a; font-size: 12px; cursor: pointer;
    }

    .comment-item:hover { color: #ff3b30; }
    .comment-item .time { color: #ff3b30; font-weight: 600; white-space: nowrap; font-variant-numeric: tabular-nums; }

    /* URL Input */
    .url-bar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: #0d0d0d;
      border-bottom: 1px solid #1a1a1a;
    }

    .url-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #222;
      color: #e0e0e0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .url-input:focus { border-color: #ff3b30; }
    .url-input::placeholder { color: #555; }

    .exercise-select {
      background: #1a1a1a;
      border: 1px solid #222;
      color: #ccc;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-analyze {
      background: #ff3b30;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .btn-analyze:hover { background: #e0342a; }
    .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

    .analyze-status {
      font-size: 12px;
      color: #888;
      padding: 4px 20px;
      display: none;
    }

    .analyze-status.show { display: block; }
    .analyze-status.error { color: #ff3b30; }

    /* Rep Height Meter */
    .rep-meter {
      position: absolute;
      right: 60px;
      top: 16px;
      bottom: 16px;
      width: 30px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      border: 1px solid #333;
      overflow: hidden;
      pointer-events: none;
      display: none;
    }

    .rep-meter.active { display: block; }

    .rep-meter-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #ff3b30, #ff6b5e, #34c759);
      border-radius: 0 0 14px 14px;
      transition: height 0.1s ease-out;
    }

    .rep-meter-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: #ffcc00;
      z-index: 2;
    }

    .rep-meter-label {
      position: absolute;
      left: -30px;
      font-size: 8px;
      color: #ffcc00;
      transform: translateY(-50%);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>no</span>cap</h1>
    <span class="badge">v1.4</span>
  </div>

  <div class="url-bar">
    <input class="url-input" id="urlInput" placeholder="Paste TikTok, YouTube, or Instagram URL..." />
    <select class="exercise-select" id="exerciseSelect">
      <option value="bench_press">Bench Press</option>
      <option value="push_up">Push Ups</option>
      <option value="forearm_curl">Forearm Curl</option>
      <option value="tricep_extension">Tricep Extension</option>
    </select>
    <button class="btn-analyze" id="btnAnalyze">Count Reps</button>
  </div>
  <div class="analyze-status" id="analyzeStatus"></div>

  <div class="container">
    <div class="player-wrap">
      <div class="video-container">
        <video id="video" playsinline></video>
        <div class="rep-counter-overlay">
          <div class="label">Reps</div>
          <div class="count" id="repCount">0</div>
        </div>
        <div class="rep-flash" id="repFlash"></div>
        <button class="skeleton-toggle" id="btnSkeleton" title="Toggle skeleton overlay">Skeleton</button>
        <div class="rep-meter" id="repMeter">
          <div class="rep-meter-fill" id="repMeterFill"></div>
          <div class="rep-meter-line" id="repMeterLine" style="bottom: 70%">
            <span class="rep-meter-label">REP</span>
          </div>
        </div>
      </div>

      <div class="timeline-section">
        <div class="timeline-bar" id="timelineBar">
          <div class="timeline-progress" id="timelineProgress"></div>
        </div>
        <div class="timeline-time">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-icon btn-ghost" id="btnRestart" title="Restart">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
        <button class="btn btn-icon btn-primary" id="btnPlay" title="Play/Pause">
          <svg id="iconPlay" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          <svg id="iconPause" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
        </button>
        <button class="btn btn-ghost" id="btnPrevRep">&lt; Rep</button>
        <button class="btn btn-ghost" id="btnNextRep">Rep &gt;</button>
        <div class="spacer"></div>
        <select class="speed-select" id="speedSelect">
          <option value="0.25">0.25x</option>
          <option value="0.5">0.5x</option>
          <option value="1" selected>1x</option>
          <option value="1.5">1.5x</option>
          <option value="2">2x</option>
        </select>
      </div>
    </div>

    <div class="sidebar">
      <div class="session-list">
        <div class="session-list-header">Sessions</div>
        <div id="sessionList"></div>
      </div>

      <div class="card" id="statsCard" style="display:none">
        <h3>Session Details</h3>
        <div id="statsContent"></div>
        <div id="repTimeline" style="margin-top:10px"></div>
      </div>

      <div class="card" id="coachSection" style="display:none">
        <h3>Coach Notes</h3>
        <div class="comment-input-wrap">
          <input class="comment-input" id="commentInput" placeholder="Add note at current time..." />
          <button class="btn btn-primary" id="btnAddComment">+</button>
        </div>
        <div class="comment-list" id="commentList"></div>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const repCountEl = document.getElementById('repCount');
    const repFlash = document.getElementById('repFlash');
    const timelineBar = document.getElementById('timelineBar');
    const timelineProgress = document.getElementById('timelineProgress');
    const btnSkeleton = document.getElementById('btnSkeleton');

    let currentSession = null;
    let sessions = [];
    let repMarkers = [];
    let showSkeleton = false;
    let lastRepCount = 0;
    let comments = {};

    try { comments = JSON.parse(localStorage.getItem('nocap_comments') || '{}'); } catch(e) {}

    function fmt(s) {
      const m = Math.floor(s / 60);
      return `${m}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
    }

    function fmtEx(e) {
      return (e || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    // ---- Sessions ----
    async function loadSessions() {
      sessions = await (await fetch('/api/sessions')).json();
      renderSessionList();
      if (sessions.length > 0) loadSession(sessions[0], 0);
    }

    function renderSessionList() {
      const el = document.getElementById('sessionList');
      el.innerHTML = sessions.map((s, i) => `
        <div class="session-item" data-idx="${i}">
          <div class="title">${fmtEx(s.exercise)}</div>
          <div class="meta">
            <span class="reps-badge">${s.reps_counted || s.reps} reps</span>
            <span>${s.date || ''}</span>
            <span>${s.duration_sec ? fmt(s.duration_sec) : ''}</span>
          </div>
        </div>
      `).join('');

      el.querySelectorAll('.session-item').forEach(item => {
        item.addEventListener('click', () => {
          loadSession(sessions[parseInt(item.dataset.idx)], parseInt(item.dataset.idx));
        });
      });
    }

    function loadSession(session, activeIdx) {
      currentSession = session;
      lastRepCount = 0;

      // Reset rep counter immediately
      repCountEl.textContent = '0';

      // Highlight active session
      document.querySelectorAll('.session-item').forEach((el, i) => {
        el.classList.toggle('active', i === activeIdx);
      });

      // Load correct video source
      const videoFile = session.video || '';
      if (showSkeleton) {
        video.src = `/api/annotated/${session.id}`;
      } else {
        video.src = `/api/video/${videoFile}`;
      }
      video.load();

      // Clear old rep markers
      document.querySelectorAll('.timeline-rep-marker').forEach(m => m.remove());
      repMarkers = session.rep_timestamps_sec || [];

      video.addEventListener('loadedmetadata', () => {
        document.getElementById('totalTime').textContent = fmt(video.duration);
        // Add rep markers to timeline
        const dur = video.duration || 1;
        repMarkers.forEach((t, i) => {
          const marker = document.createElement('div');
          marker.className = 'timeline-rep-marker';
          marker.style.left = `${(t / dur) * 100}%`;
          marker.dataset.rep = `#${i + 1}`;
          timelineBar.appendChild(marker);
        });
      }, { once: true });

      // Stats sidebar
      document.getElementById('statsCard').style.display = 'block';
      document.getElementById('coachSection').style.display = 'block';

      const rq = session.rep_quality || [];
      document.getElementById('statsContent').innerHTML = `
        <div class="stat-row"><span class="label">Exercise</span><span class="value">${fmtEx(session.exercise)}</span></div>
        <div class="stat-row"><span class="label">Reps Detected</span><span class="value">${session.reps_counted || session.reps}</span></div>
        ${session.reps_actual ? `<div class="stat-row"><span class="label">Reps Actual</span><span class="value">${session.reps_actual}</span></div>` : ''}
        ${session.equipment ? `<div class="stat-row"><span class="label">Equipment</span><span class="value">${fmtEx(session.equipment)}</span></div>` : ''}
        ${session.bench_angle ? `<div class="stat-row"><span class="label">Angle</span><span class="value">${session.bench_angle.replace(/_/g, ' ')}</span></div>` : ''}
        <div class="stat-row"><span class="label">Pose Detection</span><span class="value">${Math.round((session.pose_detection_rate || 0) * 100)}%</span></div>
        <div class="stat-row"><span class="label">Side Tracked</span><span class="value">${session.primary_side || '?'}</span></div>
        <div class="stat-row"><span class="label">Duration</span><span class="value">${fmt(session.duration_sec || 0)}</span></div>
      `;

      const repEl = document.getElementById('repTimeline');
      repEl.innerHTML = repMarkers.map((t, i) => `
        <div class="rep-timeline-item" data-time="${t}">
          <span class="rep-num">${i + 1}</span>
          <span class="rep-time">${fmt(t)}</span>
          ${rq[i] ? `<span class="rep-quality ${rq[i]}">${rq[i]}</span>` : ''}
        </div>
      `).join('');

      repEl.querySelectorAll('.rep-timeline-item').forEach(el => {
        el.addEventListener('click', () => {
          const t = parseFloat(el.dataset.time);
          video.currentTime = Math.max(0, t - 2);
          video.play();
        });
      });

      renderComments();

      // Load pose data for rep meter
      loadPoseData(session.id);
    }

    // ---- Skeleton toggle ----
    btnSkeleton.addEventListener('click', () => {
      showSkeleton = !showSkeleton;
      btnSkeleton.classList.toggle('active', showSkeleton);
      btnSkeleton.textContent = showSkeleton ? 'Skeleton ON' : 'Skeleton';
      if (currentSession) {
        const wasPlaying = !video.paused;
        const curTime = video.currentTime;
        const videoFile = currentSession.video || '';
        video.src = showSkeleton
          ? `/api/annotated/${currentSession.id}`
          : `/api/video/${videoFile}`;
        video.load();
        video.addEventListener('loadedmetadata', () => {
          video.currentTime = curTime;
          if (wasPlaying) video.play();
        }, { once: true });
      }
    });

    // ---- Playback ----
    video.addEventListener('timeupdate', () => {
      const pct = (video.currentTime / (video.duration || 1)) * 100;
      timelineProgress.style.width = `${pct}%`;
      document.getElementById('currentTime').textContent = fmt(video.currentTime);

      // Update rep counter based on current time
      const repsNow = repMarkers.filter(t => video.currentTime >= t).length;
      if (repsNow > lastRepCount) {
        repFlash.textContent = repsNow;
        repFlash.classList.remove('show');
        void repFlash.offsetWidth;
        repFlash.classList.add('show');
      }
      lastRepCount = repsNow;
      repCountEl.textContent = repsNow;
    });

    // Reset counter when seeking backwards
    video.addEventListener('seeking', () => {
      const repsNow = repMarkers.filter(t => video.currentTime >= t).length;
      lastRepCount = repsNow;
      repCountEl.textContent = repsNow;
    });

    // Timeline scrub (click + drag)
    function scrubTo(e) {
      const rect = timelineBar.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      video.currentTime = pct * (video.duration || 0);
    }

    timelineBar.addEventListener('click', scrubTo);

    let dragging = false;
    timelineBar.addEventListener('mousedown', () => { dragging = true; });
    document.addEventListener('mousemove', (e) => { if (dragging) scrubTo(e); });
    document.addEventListener('mouseup', () => { dragging = false; });

    // Touch support for mobile
    timelineBar.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      const rect = timelineBar.getBoundingClientRect();
      video.currentTime = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width)) * (video.duration || 0);
    });

    timelineBar.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      const rect = timelineBar.getBoundingClientRect();
      video.currentTime = Math.max(0, Math.min(1, (touch.clientX - rect.left) / rect.width)) * (video.duration || 0);
    });

    // Play/Pause
    document.getElementById('btnPlay').addEventListener('click', () => {
      video.paused ? video.play() : video.pause();
    });

    video.addEventListener('play', () => {
      document.getElementById('iconPlay').style.display = 'none';
      document.getElementById('iconPause').style.display = '';
    });

    video.addEventListener('pause', () => {
      document.getElementById('iconPlay').style.display = '';
      document.getElementById('iconPause').style.display = 'none';
    });

    document.getElementById('btnRestart').addEventListener('click', () => {
      video.currentTime = 0;
      lastRepCount = 0;
      repCountEl.textContent = '0';
      video.play();
    });

    document.getElementById('speedSelect').addEventListener('change', (e) => {
      video.playbackRate = parseFloat(e.target.value);
    });

    // ---- Rep navigation (fixed) ----
    document.getElementById('btnPrevRep').addEventListener('click', () => {
      if (!repMarkers.length) return;
      // Find the last rep that's at least 1s before current position
      const cur = video.currentTime;
      let target = -1;
      for (let i = repMarkers.length - 1; i >= 0; i--) {
        if (repMarkers[i] < cur - 1) { target = i; break; }
      }
      if (target < 0) target = 0;
      video.currentTime = Math.max(0, repMarkers[target] - 2);
    });

    document.getElementById('btnNextRep').addEventListener('click', () => {
      if (!repMarkers.length) return;
      const cur = video.currentTime;
      let target = -1;
      for (let i = 0; i < repMarkers.length; i++) {
        if (repMarkers[i] > cur + 0.5) { target = i; break; }
      }
      if (target < 0) target = repMarkers.length - 1;
      video.currentTime = Math.max(0, repMarkers[target] - 2);
    });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); video.paused ? video.play() : video.pause(); }
      if (e.code === 'ArrowLeft') video.currentTime -= 2;
      if (e.code === 'ArrowRight') video.currentTime += 2;
      if (e.code === 'KeyR') { video.currentTime = 0; video.play(); }
      if (e.code === 'KeyS') btnSkeleton.click();
    });

    // ---- Coach comments ----
    function renderComments() {
      if (!currentSession) return;
      const list = (comments[currentSession.id] || []).sort((a, b) => a.time - b.time);
      document.getElementById('commentList').innerHTML = list.map((c, i) => `
        <div class="comment-item" data-time="${c.time}">
          <span class="time">${fmt(c.time)}</span>
          <span>${c.text}</span>
        </div>
      `).join('');

      document.querySelectorAll('#commentList .comment-item').forEach(el => {
        el.addEventListener('click', () => { video.currentTime = parseFloat(el.dataset.time); });
      });
    }

    function addComment() {
      const input = document.getElementById('commentInput');
      const text = input.value.trim();
      if (!text || !currentSession) return;
      if (!comments[currentSession.id]) comments[currentSession.id] = [];
      comments[currentSession.id].push({ time: video.currentTime, text });
      localStorage.setItem('nocap_comments', JSON.stringify(comments));
      input.value = '';
      renderComments();
    }

    document.getElementById('btnAddComment').addEventListener('click', addComment);
    document.getElementById('commentInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') addComment(); });

    // ---- URL Analyze ----
    const btnAnalyze = document.getElementById('btnAnalyze');
    const urlInput = document.getElementById('urlInput');
    const analyzeStatus = document.getElementById('analyzeStatus');

    btnAnalyze.addEventListener('click', analyzeUrl);
    urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') analyzeUrl(); });

    async function analyzeUrl() {
      const url = urlInput.value.trim();
      if (!url) return;

      const exercise = document.getElementById('exerciseSelect').value;
      btnAnalyze.disabled = true;
      btnAnalyze.textContent = 'Downloading...';
      analyzeStatus.textContent = 'Downloading video and counting reps...';
      analyzeStatus.className = 'analyze-status show';

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, exercise }),
        });

        const data = await res.json();

        if (!res.ok) {
          analyzeStatus.textContent = `Error: ${data.error}`;
          analyzeStatus.className = 'analyze-status show error';
          return;
        }

        analyzeStatus.textContent = `Done! ${data.reps_counted} reps detected.`;
        analyzeStatus.className = 'analyze-status show';

        // Reload sessions and select the new one
        sessions = await (await fetch('/api/sessions')).json();
        renderSessionList();
        const newIdx = sessions.findIndex(s => s.id === data.id);
        if (newIdx >= 0) {
          loadSession(sessions[newIdx], newIdx);
        }

        urlInput.value = '';
        setTimeout(() => { analyzeStatus.className = 'analyze-status'; }, 5000);

      } catch (e) {
        analyzeStatus.textContent = `Error: ${e.message}`;
        analyzeStatus.className = 'analyze-status show error';
      } finally {
        btnAnalyze.disabled = false;
        btnAnalyze.textContent = 'Count Reps';
      }
    }

    // ---- Rep Height Meter ----
    const repMeter = document.getElementById('repMeter');
    const repMeterFill = document.getElementById('repMeterFill');
    let poseData = null;

    async function loadPoseData(sessionId) {
      try {
        const res = await fetch(`/api/poses/${sessionId}`);
        if (res.ok) {
          poseData = await res.json();
          repMeter.classList.add('active');
        } else {
          poseData = null;
          repMeter.classList.remove('active');
        }
      } catch (e) {
        poseData = null;
        repMeter.classList.remove('active');
      }
    }

    // Update meter based on current video time
    function updateRepMeter() {
      if (!poseData || !poseData.frames || poseData.frames.length === 0) return;
      if (video.paused) return; // Stop updating when paused

      const t = video.currentTime;
      let closest = poseData.frames[0];
      for (const f of poseData.frames) {
        if (f.t <= t) closest = f;
        else break;
      }

      // Use the primary side angle
      const angle = Math.max(closest.la, closest.ra);

      // For curls: high angle = arm straight (REST), low angle = curled (TOP of rep)
      // For press: high angle = locked out (TOP of rep), low angle = bottom
      // So for curls, we invert: meter should be HIGH when angle is LOW (curled up)
      const exercise = currentSession ? currentSession.exercise : 'bench_press';
      const isCurl = exercise === 'forearm_curl';

      let pct;
      if (isCurl) {
        // Invert: 180° = 0% (arm straight, resting), 30° = 100% (fully curled)
        pct = Math.min(100, Math.max(0, ((180 - angle) / 150) * 100));
      } else {
        // Normal: 180° = 100% (locked out), 30° = 0% (bottom)
        pct = Math.min(100, Math.max(0, (angle / 180) * 100));
      }

      repMeterFill.style.height = `${pct}%`;

      // Color: green at top of rep, red at bottom
      if (pct > 70) {
        repMeterFill.style.background = 'linear-gradient(to top, #34c759, #30d158)';
      } else if (pct > 40) {
        repMeterFill.style.background = 'linear-gradient(to top, #ffcc00, #ff9500)';
      } else {
        repMeterFill.style.background = 'linear-gradient(to top, #ff3b30, #ff6b5e)';
      }

      requestAnimationFrame(updateRepMeter);
    }

    // Start meter animation when video plays
    video.addEventListener('play', () => { if (poseData) requestAnimationFrame(updateRepMeter); });

    // ---- Init ----
    loadSessions();
  </script>
</body>
</html>
